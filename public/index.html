              <div class="chat-intro-meta">Last modified 3 minutes ago</div>
            </div>
          </div>

          <form id="chat-form" class="composer" autocomplete="off">
              <textarea
              id="chat-input"
              class="chat-input"
              rows="1"
              placeholder="Ask a question, request a visualization, or run a command..."
            ></textarea>
            <button class="send-button" type="submit">Send</button>
          </form>
        </section>

        <aside class="side-column">
          <section class="panel viz-panel">
            <div class="panel-header">
              <div>
                <div class="eyebrow">Output</div>
                <h2>Visualization</h2>
              </div>
              <div class="header-note">Charts / Python / tables</div>
            </div>

            <div class="viz-shell">
              <div id="viz-meta" class="viz-meta">Ready for the next prompt.</div>
              <div class="viz-actions">
              </div>
              <div id="viz-root" class="viz-root">
                <div class="muted">Visualizations appear here.</div>
              </div>
            </div>
          </section>
        </aside>
      </section>
