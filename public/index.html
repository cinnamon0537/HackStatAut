<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatWithYourData</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel chat-panel">
        <div class="panel-header">
          <div>
            <div class="eyebrow">ChatWithYourData</div>
            <h1>OpenCode im Web</h1>
          </div>
          <div class="status-pill" id="opencode-status">startet ...</div>
        </div>
        <iframe id="opencode-frame" class="opencode-frame" src="/opencode/" title="OpenCode Web"></iframe>
      </section>

      <section class="panel viz-panel">
        <div class="panel-header">
          <div>
            <div class="eyebrow">Ausgabe</div>
            <h1>Visualisierung</h1>
          </div>
        </div>

        <div class="viz-shell">
          <div class="viz-actions">
            <div class="status-pill" id="visualize-mode">normal</div>
            <button id="visualize-next" class="ghost" type="button">Visualisieren</button>
          </div>
          <div id="viz-meta" class="viz-meta">Bereit für den nächsten Prompt.</div>
          <div id="viz-root" class="viz-root">
            <div class="muted">Hier erscheinen Visualisierungen von OpenCode.</div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
