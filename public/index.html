<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatWithYourData</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel chat-panel">
        <div class="panel-header">
          <div>
            <div class="eyebrow">ChatWithYourData</div>
            <h1>Chat</h1>
          </div>
          <div class="status-pill" id="opencode-status">startet ...</div>
        </div>
        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <form id="chat-form" class="composer" autocomplete="off">
          <textarea
            id="chat-input"
            class="chat-input"
            rows="1"
            placeholder="Schreib eine Frage oder fordere eine Visualisierung an..."
          ></textarea>
          <button class="send-button" type="submit">Senden</button>
        </form>
      </section>

      <section class="panel viz-panel">
        <div class="panel-header">
          <div>
            <div class="eyebrow">Ausgabe</div>
            <h1>Visualisierung</h1>
          </div>
          <div class="status-pill subtle" id="viz-status">wartet</div>
        </div>

        <div class="viz-shell">
          <div id="viz-meta" class="viz-meta">Bereit für den nächsten Prompt.</div>
          <div id="viz-root" class="viz-root">
            <div class="muted">Hier erscheinen Visualisierungen von OpenCode.</div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
